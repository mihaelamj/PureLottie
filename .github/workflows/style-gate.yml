name: Style gate

on:
  pull_request:

jobs:
  style:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Fetch base ref
        run: git fetch --no-tags --depth=1 origin "${{ github.base_ref }}"
      - name: Run style gate
        run: bash scripts/check-style.sh "origin/${{ github.base_ref }}"
